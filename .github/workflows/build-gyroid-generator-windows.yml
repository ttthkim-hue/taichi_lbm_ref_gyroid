# GyroidGenerator — (1) Ubuntu 문법 검증 (2) Windows exe + OCP/STEP

name: Build GyroidGenerator (Windows exe)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "geometry_exchange_ansys/exe_file_final/gyroid_generator/**"
      - ".github/workflows/build-gyroid-generator-windows.yml"

jobs:
  verify-python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check gyroid_gui.py
        run: python3 -m py_compile geometry_exchange_ansys/exe_file_final/gyroid_generator/gyroid_gui.py

  pyinstaller-windows:
    needs: verify-python-syntax
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
        working-directory: geometry_exchange_ansys/exe_file_final/gyroid_generator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: geometry_exchange_ansys/exe_file_final/gyroid_generator/requirements.txt

      - name: Install dependencies (incl. cadquery for STEP/OCP)
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install numpy scipy scikit-image trimesh manifold3d pyinstaller cadquery

      - name: PyInstaller
        run: pyinstaller --noconfirm GyroidGenerator.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GyroidGenerator-windows
          path: geometry_exchange_ansys/exe_file_final/gyroid_generator/dist/GyroidGenerator.exe
          if-no-files-found: error
