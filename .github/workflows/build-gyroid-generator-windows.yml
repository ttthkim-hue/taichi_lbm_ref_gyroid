# GyroidGenerator — (1) Ubuntu 문법 검증 (2) Windows exe + OCP/STEP

name: Build GyroidGenerator (Windows exe)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "geometry_exchange_ansys/exe_file_final/gyroid_generator/**"
      - ".github/workflows/build-gyroid-generator-windows.yml"

jobs:
  verify-python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check gyroid_gui.py
        run: python3 -m py_compile geometry_exchange_ansys/exe_file_final/gyroid_generator/gyroid_gui.py

  pyinstaller-windows:
    needs: verify-python-syntax
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
        working-directory: geometry_exchange_ansys/exe_file_final/gyroid_generator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: geometry_exchange_ansys/exe_file_final/gyroid_generator/requirements.txt

      - name: Install dependencies (incl. cadquery for STEP/OCP)
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install numpy scipy scikit-image trimesh manifold3d shapely rtree pyinstaller cadquery

      - name: Validate STEP generation (OCP pipeline test)
        run: |
          python -c "
          import sys, os, time
          print('=== STEP Generation Validation ===')

          # 1) OCP import test
          try:
              from OCP.BRepBuilderAPI import BRepBuilderAPI_MakeSolid, BRepBuilderAPI_Sewing
              from OCP.STEPControl import STEPControl_AsIs, STEPControl_Writer
              from OCP.StlAPI import StlAPI_Reader
              from OCP.Interface import Interface_Static
              from OCP.TopAbs import TopAbs_SHELL
              from OCP.TopoDS import TopoDS, TopoDS_Shape
              from OCP.TopExp import TopExp_Explorer
              print('[PASS] OCP modules imported successfully')
          except ImportError as e:
              print(f'[FAIL] OCP import error: {e}')
              sys.exit(1)

          # 2) Generate small test gyroid STL
          import numpy as np
          from skimage.measure import marching_cubes
          import trimesh

          # Small grid for CI speed (20x20x20 → ~5K faces, sewing <30s)
          a, t_val = 5.0, 0.3
          n = 20
          x = np.linspace(1.0, 24.4, n)
          z = np.linspace(5.0, 105.0, n)
          X, Y, Z = np.meshgrid(x, x, z, indexing='ij')
          k = 2*np.pi/a
          phi = np.sin(k*X)*np.cos(k*Y) + np.sin(k*Y)*np.cos(k*Z) + np.sin(k*Z)*np.cos(k*X)
          sp = (24.4-1.0)/(n-1)
          verts, faces, _, _ = marching_cubes(phi, level=-t_val,
              spacing=(sp, sp, 100.0/(n-1)))
          verts[:, 0] += 1.0; verts[:, 1] += 1.0; verts[:, 2] += 5.0
          mesh = trimesh.Trimesh(vertices=verts, faces=faces)

          # Clean mesh
          trimesh.repair.fix_normals(mesh)
          trimesh.repair.fix_winding(mesh)
          mesh.merge_vertices()
          mesh.remove_unreferenced_vertices()
          mesh.process(validate=True)

          stl_path = 'ci_test.stl'
          mesh.export(stl_path, file_type='stl')
          print(f'[PASS] Test STL generated: {len(mesh.faces)} faces, {os.path.getsize(stl_path)/1024:.0f} KB')

          # 3) STL -> STEP conversion
          reader = StlAPI_Reader()
          shape = TopoDS_Shape()

          if not reader.Read(shape, os.path.abspath(stl_path)):
              print('[FAIL] OCP StlAPI_Reader failed'); sys.exit(1)
          print(f'[PASS] STL loaded into OCP, null={shape.IsNull()}')

          sewing = BRepBuilderAPI_Sewing(0.1)
          sewing.SetNonManifoldMode(True)
          sewing.Add(shape)
          t0 = time.time()
          sewing.Perform()
          sewn = sewing.SewedShape()
          print(f'[PASS] Sewing done in {time.time()-t0:.1f}s, null={sewn.IsNull()}')

          result = sewn
          try:
              explorer = TopExp_Explorer(sewn, TopAbs_SHELL)
              if explorer.More():
                  shell = TopoDS.Shell_s(explorer.Current())
                  maker = BRepBuilderAPI_MakeSolid(shell)
                  if maker.IsDone():
                      result = maker.Solid()
                      print('[PASS] Shell -> Solid conversion succeeded')
                  else:
                      print('[WARN] Solid conversion failed, using shell')
          except Exception as e:
              print(f'[WARN] Solid conversion skipped: {e}')

          step_path = 'ci_test.step'
          writer = STEPControl_Writer()
          Interface_Static.SetCVal_s('write.step.schema', 'AP214')
          writer.Transfer(result, STEPControl_AsIs)
          status = writer.Write(os.path.abspath(step_path))
          if status != 1 or not os.path.isfile(step_path):
              print(f'[FAIL] STEP write failed, status={status}'); sys.exit(1)

          size_kb = os.path.getsize(step_path) / 1024
          if size_kb < 1:
              print(f'[FAIL] STEP file too small: {size_kb:.1f} KB'); sys.exit(1)
          print(f'[PASS] STEP generated: {size_kb:.0f} KB')
          print('=== All STEP validation checks passed ===')
          "

      - name: PyInstaller
        run: pyinstaller --noconfirm GyroidGenerator.spec

      - name: Upload artifact (onedir folder)
        uses: actions/upload-artifact@v4
        with:
          name: GyroidGenerator-windows
          path: geometry_exchange_ansys/exe_file_final/gyroid_generator/dist/GyroidGenerator/
          if-no-files-found: error
